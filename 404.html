<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Redirigiendo…</title>
    <script>
      (function () {
        const pathSegmentsToKeep = 1;
        const location = window.location;
        const preservedPath = location.pathname.split("/").slice(0, pathSegmentsToKeep + 1).join("/");
        const routePath = location.pathname
          .slice(1)
          .split("/")
          .slice(pathSegmentsToKeep)
          .join("/")
          .replace(/&/g, "~and~");
        const query = location.search ? `&${location.search.slice(1).replace(/&/g, "~and~")}` : "";

        location.replace(
          `${location.protocol}//${location.hostname}${location.port ? `:${location.port}` : ""}${preservedPath}/?/${routePath}${query}${location.hash}`,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
