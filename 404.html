<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirigiendo…</title>
    <script>
      (function () {
        const path = window.location.pathname || "/";
        const query = window.location.search.length > 1 ? window.location.search.slice(1) : "";
        const isGithubPages = window.location.hostname.endsWith("github.io");
        const segments = path.split("/").filter(Boolean);
        const segmentsToKeep = isGithubPages ? 1 : 0;
        const basePath = segmentsToKeep ? `/${segments.slice(0, segmentsToKeep).join("/")}` : "";
        const appPathSegments = segments.slice(segmentsToKeep);
        const appPath = appPathSegments.length ? `/${appPathSegments.join("/")}` : "/";
        const encodedPath = encodeURIComponent(appPath);
        const encodedQuery = encodeURIComponent(query);
        const target = `${basePath}/?p=${encodedPath}${query ? `&q=${encodedQuery}` : ""}${window.location.hash || ""}`;

        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
